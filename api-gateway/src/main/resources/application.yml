server:
  port: 8080

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970  # 256-bit hex secret — replace in production

iot:
  api:
    base-url: http://104.211.95.241:8080/api   # External IoT platform — used to validate login credentials

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: zone-service
            uri: lb://zone-service
            predicates:
              - Path=/api/zones/**

          - id: sensor-service
            uri: lb://sensor-service
            predicates:
              - Path=/api/sensors/**

          - id: automation-service
            uri: lb://automation-service
            predicates:
              - Path=/api/automation/**

          - id: crop-service
            uri: lb://crop-service
            predicates:
              - Path=/api/crops/**
