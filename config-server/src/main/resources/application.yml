spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/KaviDJ02/agms-config-repo
          default-label: main
          search-paths: '{application}'
          clone-on-start: true

server:
  port: 8888

eureka:
  client:
    # register-with-eureka: false   # Config Server is reached by direct URL (bootstrap.yml), not via Eureka
    # fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
