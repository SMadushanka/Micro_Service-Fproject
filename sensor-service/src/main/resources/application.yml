server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:sensordb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true

iot:
  api:
    base-url: http://104.211.95.241:8080/api   # Replace with actual IoT API base URL
    device-id: 6dd1b80c-4a05-4ec0-a371-f7782774435a            # Replace with the deviceId stored during zone creation
    bearer-token:                              # Legacy fallback — leave blank; token is now auto-refreshed at startup
    username: sampath                          # IoT platform username used for auto-authentication
    password: 123456              # ← REPLACE THIS with the real IoT password for "kavindu"
    zone-id: 1                               # Must be a numeric ID from zone-service (the 'id' field in the zone creation response)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
